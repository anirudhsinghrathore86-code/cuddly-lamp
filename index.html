<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anirudh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      transition: all 0.3s ease;
    }

    .glass {
      backdrop-filter: blur(18px);
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .dark {
      background: linear-gradient(to bottom right, #000, #020617);
      color: white;
    }

    .dark .glass {
      background: rgba(0,0,0,0.4);
    }

    img {
      transition: transform 0.3s ease;
    }

    img:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body class="bg-gradient-to-br from-white to-blue-100 text-black">

<div class="min-h-screen p-5">

  <!-- NAVBAR -->
  <div class="flex justify-between items-center mb-10">
    <h1 class="font-bold text-lg">Anirudh</h1>

    <div class="flex gap-4 text-sm">
      <button onclick="showPage('home')" class="hover:opacity-70">Home</button>
      <button onclick="showPage('thoughts')" class="hover:opacity-70">Thoughts</button>
      <button onclick="toggleDark()" class="px-2 py-1 border rounded-lg">🌙</button>
    </div>
  </div>

  <!-- HOME -->
  <div id="home">

    <!-- HERO -->
    <div class="text-center">
      <img src="YOUR_IMAGE_1"
        class="w-36 h-36 mx-auto rounded-full object-cover shadow-xl border border-white/40">

      <h1 class="text-3xl font-bold mt-4">Anirudh</h1>
      <p class="opacity-70 mt-1">I build, I think, I write</p>
    </div>

    <!-- SOCIAL CARDS -->
    <div class="mt-10 space-y-4">

      <a href="https://instagram.com/anrdh86" target="_blank"
        class="block glass p-4 rounded-2xl text-center hover:scale-105 transition">
        📸 Instagram
      </a>

      <a href="https://github.com/anirudhsinghrathore86" target="_blank"
        class="block glass p-4 rounded-2xl text-center hover:scale-105 transition">
        💻 GitHub
      </a>

      <a href="mailto:anirudh86@gmail.com"
        class="block glass p-4 rounded-2xl text-center hover:scale-105 transition">
        ✉️ Email Me
      </a>

    </div>

    <!-- DESIGN IMAGE -->
    <div class="mt-12">
      <img src="YOUR_IMAGE_2"
        class="rounded-3xl opacity-90 shadow-lg">
    </div>

  </div>

  <!-- THOUGHTS -->
  <div id="thoughts" class="hidden">

    <div class="text-center mt-20">
      <h1 class="text-3xl font-bold">मेरी L ज़िंदगी</h1>
      <p class="mt-3 opacity-70">Thoughts coming soon...</p>
    </div>

    <div class="mt-10">
      <img src="YOUR_IMAGE_3"
        class="rounded-3xl shadow-lg">
    </div>

  </div>

</div>

<script>
let dark = false;

function toggleDark() {
  dark = !dark;
  document.body.classList.toggle("dark");
}

function showPage(page) {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("thoughts").classList.add("hidden");

  document.getElementById(page).classList.remove("hidden");
}
</script>

</body>
</html>
