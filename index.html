<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anirudh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-white to-blue-100 text-black">

<div id="app" class="min-h-screen p-5">

  <!-- Navbar -->
  <div class="flex justify-between mb-10">
    <h1 class="font-bold text-lg">Anirudh</h1>
    <button onclick="toggleDark()">🌙</button>
  </div>

  <!-- Home -->
  <div id="home">
    <h1 class="text-4xl font-bold text-center">Anirudh</h1>
    <p class="text-center mt-2">I build, I think, I write</p>
    <div class="text-center">
      <button onclick="showPage('blog')" class="mt-5 px-5 py-2 border rounded-xl">
        Read my thoughts
      </button>
    </div>
  </div>

  <!-- Blog -->
  <div id="blog" class="hidden">
    <h2 class="text-2xl font-bold">मेरी L ज़िंदगी</h2>

    <input id="search" placeholder="Search..." 
      class="mt-3 p-2 w-full border rounded-xl"
      oninput="filterPosts()">

    <div id="posts" class="mt-4 space-y-3"></div>

    <button onclick="showPage('home')" class="mt-5">← Back</button>
  </div>

  <!-- Contact -->
  <div id="contact" class="hidden">
    <h2 class="text-2xl font-bold">Contact</h2>
    <p class="mt-3">Instagram: anrdh86</p>
    <p>GitHub: anirudhsinghrathore86</p>
    <p>Email: anirudh86@gmail.com</p>
  </div>

</div>

<script>
let dark = false;

function toggleDark() {
  dark = !dark;
  document.body.classList.toggle("bg-black");
  document.body.classList.toggle("text-white");
}

function showPage(page) {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("blog").classList.add("hidden");
  document.getElementById("contact").classList.add("hidden");

  document.getElementById(page).classList.remove("hidden");
}

const posts = [
  {title: "Why my life feels messed up"},
  {title: "How I think differently"}
];

function renderPosts(list) {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="p-3 border rounded-xl">
        ${p.title}
      </div>
    `;
  });
}

function filterPosts() {
  const val = document.getElementById("search").value.toLowerCase();
  const filtered = posts.filter(p => p.title.toLowerCase().includes(val));
  renderPosts(filtered);
}

renderPosts(posts);
</script>

</body>
  </html>
