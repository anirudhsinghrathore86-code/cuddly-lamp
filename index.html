<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anirudh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: linear-gradient(135deg, #f8fbff, #e6f0ff);
    transition: 0.3s;
  }

  .dark {
    background: #05070f;
    color: white;
  }

  .glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  }

  .dark .glass {
    background: rgba(255,255,255,0.05);
  }

  .float {
    transition: 0.4s;
  }

  .float:hover {
    transform: translateY(-6px) scale(1.03);
  }

  .glow {
    box-shadow: 0 0 40px rgba(0,100,255,0.2);
  }
</style>
</head>

<body>

<div class="p-6 max-w-md mx-auto">

  <!-- TOP BAR -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="font-semibold text-lg">Anirudh</h1>
    <button onclick="toggleDark()">🌙</button>
  </div>

  <!-- HERO -->
  <div class="text-center">
    <img src="YOUR_FACE_IMAGE"
      class="w-28 h-28 mx-auto rounded-full object-cover shadow-lg glow">

    <h1 class="text-2xl font-bold mt-4">Anirudh</h1>
    <p class="opacity-60 text-sm">I build, I think, I write</p>
  </div>

  <!-- GRID -->
  <div class="grid grid-cols-3 gap-4 mt-10">

    <a href="https://instagram.com/anrdh86" target="_blank"
      class="glass p-4 text-center float">
      📸
      <p class="text-xs mt-1">Instagram</p>
    </a>

    <a href="https://github.com/anirudhsinghrathore86" target="_blank"
      class="glass p-4 text-center float">
      💻
      <p class="text-xs mt-1">GitHub</p>
    </a>

    <a href="mailto:anirudh86@gmail.com"
      class="glass p-4 text-center float">
      ✉️
      <p class="text-xs mt-1">Email</p>
    </a>

    <div onclick="showPage('thoughts')"
      class="glass p-4 text-center float cursor-pointer">
      🧠
      <p class="text-xs mt-1">Thoughts</p>
    </div>

    <div class="glass p-4 text-center float">
      ⚡
      <p class="text-xs mt-1">Projects</p>
    </div>

    <div class="glass p-4 text-center float">
      🚀
      <p class="text-xs mt-1">Future</p>
    </div>

  </div>

  <!-- THOUGHTS PAGE -->
  <div id="thoughts" class="hidden mt-16 text-center">

    <h2 class="text-xl font-bold">मेरी L ज़िंदगी</h2>
    <p class="opacity-60 mt-2 text-sm">Coming soon...</p>

    <img src="YOUR_CAMERA_IMAGE"
      class="mt-6 rounded-2xl shadow-lg">

  </div>

  <!-- DECOR IMAGE -->
  <img src="YOUR_ICONS_IMAGE"
    class="mt-12 rounded-2xl opacity-80">

</div>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
}

function showPage(page) {
  document.getElementById("thoughts").classList.toggle("hidden");
}
</script>

</body>
</html>
